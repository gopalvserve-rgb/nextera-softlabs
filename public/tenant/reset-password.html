<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Reset password</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #f1f5f9; margin: 0; padding: 0; min-height: 100vh; display: grid; place-items: center; }
  .card { background: #fff; padding: 2rem 1.75rem; border-radius: 14px; box-shadow: 0 4px 20px rgba(15,23,42,.08); width: min(420px, 92vw); }
  h1 { margin: 0 0 .5rem; font-size: 1.4rem; color: #4f46e5; }
  p.muted { color: #64748b; font-size: .9rem; margin: 0 0 1.5rem; }
  label { display: block; font-size: .85rem; font-weight: 600; color: #334155; margin: .9rem 0 .35rem; }
  input[type=password] { width: 100%; padding: .65rem .75rem; font-size: 1rem; border: 1.5px solid #cbd5e1; border-radius: 8px; }
  input:focus { outline: none; border-color: #4f46e5; }
  .btn { width: 100%; padding: .8rem 1rem; font-size: 1rem; font-weight: 600; background: #4f46e5; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-top: 1.25rem; }
  .btn:disabled { opacity: .55; cursor: progress; }
  .msg { padding: .8rem 1rem; border-radius: 8px; margin-top: 1rem; font-size: .9rem; }
  .msg.ok { background: #ecfdf5; color: #065f46; }
  .msg.err { background: #fef2f2; color: #991b1b; }
  .back { text-align: center; margin-top: 1rem; font-size: .85rem; }
  .back a { color: #6366f1; text-decoration: none; }
</style>
</head>
<body>
  <div class="card">
    <h1>🔐 Reset password</h1>
    <p class="muted">Choose a new password for your CRM account.</p>
    <form id="frm">
      <label>New password</label>
      <input type="password" id="p1" minlength="6" required autofocus />
      <label>Confirm password</label>
      <input type="password" id="p2" minlength="6" required />
      <button type="submit" class="btn" id="sb">Set new password</button>
      <div id="msg"></div>
    </form>
    <div class="back"><a href="./">← Back to sign in</a></div>
  </div>
<script>
(function(){
  var p = new URLSearchParams(location.search);
  var token = p.get('token') || '';
  if (!token) {
    document.getElementById('msg').className = 'msg err';
    document.getElementById('msg').textContent = 'This link is missing a reset token. Request a fresh one from the sign-in page.';
    document.getElementById('sb').disabled = true;
    return;
  }
  document.getElementById('frm').addEventListener('submit', async function(ev) {
    ev.preventDefault();
    var p1 = document.getElementById('p1').value;
    var p2 = document.getElementById('p2').value;
    var msg = document.getElementById('msg');
    var sb = document.getElementById('sb');
    msg.textContent = ''; msg.className = '';
    if (p1 !== p2) { msg.className = 'msg err'; msg.textContent = 'Passwords don\u2019t match.'; return; }
    if (p1.length < 6) { msg.className = 'msg err'; msg.textContent = 'Password must be at least 6 characters.'; return; }
    sb.disabled = true; sb.textContent = 'Saving\u2026';
    try {
      var r = await fetch('/api', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fn: 'api_password_reset', args: ['', token, p1] })
      }).then(r => r.json());
      if (!r || r.error) throw new Error((r && r.error) || 'Reset failed');
      msg.className = 'msg ok';
      msg.textContent = 'Password updated. Redirecting to sign in\u2026';
      setTimeout(function(){ location.href = './'; }, 1500);
    } catch (e) {
      sb.disabled = false; sb.textContent = 'Set new password';
      msg.className = 'msg err';
      msg.textContent = e.message;
    }
  });
})();
</script>
</body>
</html>
