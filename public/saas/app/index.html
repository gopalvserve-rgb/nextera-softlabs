<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <title>NextEra Softlabs</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><text y=%2224%22 font-size=%2226%22>%F0%9F%8E%AF</text></svg>" />
  <style>
    *,*::before,*::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
      color: #fff;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      padding-top: max(1.5rem, env(safe-area-inset-top));
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
      -webkit-tap-highlight-color: transparent;
    }
    .card {
      background: #fff;
      color: #0f172a;
      border-radius: 22px;
      width: 100%;
      max-width: 420px;
      padding: 2.25rem 1.75rem;
      box-shadow: 0 25px 70px rgba(0,0,0,.28);
    }
    .icon {
      width: 78px; height: 78px; margin: 0 auto 1.1rem;
      border-radius: 22px;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      display: grid; place-items: center;
      font-size: 2.4rem;
      box-shadow: 0 10px 25px rgba(99,102,241,.35);
    }
    h1 { margin: 0 0 .35rem; font-size: 1.5rem; text-align: center; }
    p.muted { margin: 0 0 1.4rem; color: #64748b; text-align: center; font-size: .95rem; line-height: 1.4; }
    label { display: block; font-weight: 600; font-size: .85rem; margin: .6rem 0 .35rem; color: #334155; }
    .input-wrap { position: relative; }
    .input-wrap .prefix {
      position: absolute; left: .85rem; top: 50%; transform: translateY(-50%);
      color: #94a3b8; font-size: .9rem; pointer-events: none; user-select: none;
    }
    input[type=text] {
      width: 100%; padding: .85rem 1rem .85rem 9.7rem;
      border: 1.5px solid #e2e8f0; border-radius: 12px;
      font-size: 1rem; color: #0f172a;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none; appearance: none;
    }
    input[type=text]:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.18);
    }
    button {
      width: 100%; margin-top: 1rem;
      padding: .95rem 1rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: 0; border-radius: 12px;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(99,102,241,.35);
      transition: transform .1s, box-shadow .15s;
    }
    button:active { transform: scale(.98); }
    button.secondary {
      background: #fff; color: #6366f1;
      border: 1.5px solid #e2e8f0;
      box-shadow: none;
      margin-top: .55rem;
    }
    .err {
      color: #dc2626; font-size: .85rem; margin: .6rem 0 0;
      min-height: 1.1em;
    }
    .saved {
      background: #f1f5f9; border-radius: 12px;
      padding: .9rem 1rem; margin-bottom: 1rem;
      display: flex; align-items: center; gap: .7rem;
    }
    .saved .ws-dot {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      display: grid; place-items: center; color: #fff; font-weight: 700;
      flex-shrink: 0;
    }
    .saved .ws-meta { flex: 1; min-width: 0; }
    .saved .ws-label { font-size: .75rem; color: #64748b; }
    .saved .ws-slug { font-weight: 600; color: #0f172a; word-break: break-all; }
    .help {
      font-size: .8rem; color: #94a3b8; text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.2rem; border-top: 1px solid #f1f5f9;
    }
    .help a { color: #6366f1; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎯</div>

    <!-- State A: workspace already saved -->
    <div id="state-saved" hidden>
      <h1>Welcome back</h1>
      <p class="muted">Tap continue to open your workspace.</p>
      <div class="saved">
        <div class="ws-dot" id="ws-initial">?</div>
        <div class="ws-meta">
          <div class="ws-label">Workspace</div>
          <div class="ws-slug" id="ws-slug-display">—</div>
        </div>
      </div>
      <button id="btn-continue">Continue</button>
      <button id="btn-switch" class="secondary">Switch workspace</button>
    </div>

    <!-- State B: pick a workspace -->
    <div id="state-pick">
      <h1>NextEra Softlabs</h1>
      <p class="muted">Enter your workspace ID to sign in. You'll find this in the welcome email — it's the part of your CRM URL after <b>/t/</b>.</p>
      <form id="pick-form" autocomplete="off">
        <label for="slug">Workspace ID</label>
        <div class="input-wrap">
          <span class="prefix">/t/</span>
          <input id="slug" name="slug" type="text" inputmode="latin-name" autocapitalize="none" autocomplete="off" spellcheck="false" placeholder="acme" required pattern="[a-z0-9][a-z0-9-]*" />
        </div>
        <p id="err" class="err"></p>
        <button type="submit">Open workspace</button>
      </form>
    </div>

    <p class="help">Don't have a workspace yet? <a href="/" id="signup-link">Sign up</a></p>
  </div>

  <script>
    (function () {
      var STORE_KEY = 'tenant_slug';
      var $ = function (id) { return document.getElementById(id); };

      function normalizeSlug(s) {
        return String(s || '')
          .trim()
          .toLowerCase()
          // Allow paste of full URLs like https://crm.smartcrmsolution.com/t/acme/
          .replace(/^https?:\/\/[^/]+/, '')
          .replace(/^\/+/, '')
          .replace(/^t\//, '')
          .replace(/\/.*$/, '');
      }

      function isValidSlug(s) {
        return /^[a-z0-9][a-z0-9-]*$/.test(s);
      }

      function gotoWorkspace(slug) {
        // Use replace so the picker isn't kept in WebView history.
        window.location.replace(location.origin + '/t/' + encodeURIComponent(slug) + '/');
      }

      function showSavedState(slug) {
        $('state-saved').hidden = false;
        $('state-pick').hidden  = true;
        $('ws-slug-display').textContent = slug;
        $('ws-initial').textContent = (slug[0] || '?').toUpperCase();
      }

      function showPickState() {
        $('state-saved').hidden = true;
        $('state-pick').hidden  = false;
        setTimeout(function () { $('slug').focus(); }, 50);
      }

      var saved = '';
      try { saved = localStorage.getItem(STORE_KEY) || ''; } catch (_) {}

      // If launched with ?slug=... (e.g., a deep link from email), persist + open immediately.
      var qs = new URLSearchParams(location.search);
      var fromQuery = normalizeSlug(qs.get('slug'));
      if (fromQuery && isValidSlug(fromQuery)) {
        try { localStorage.setItem(STORE_KEY, fromQuery); } catch (_) {}
        gotoWorkspace(fromQuery);
        return;
      }

      // Auto-jump path — if a slug is already saved AND there's no ?stay=1 override, go straight in.
      var stay = qs.has('stay');
      if (saved && isValidSlug(saved) && !stay) {
        // Defer one tick so the splash UI flashes briefly instead of looking blank.
        setTimeout(function () { gotoWorkspace(saved); }, 50);
        showSavedState(saved);
        return;
      }

      if (saved && isValidSlug(saved)) {
        showSavedState(saved);
      } else {
        showPickState();
      }

      $('pick-form').addEventListener('submit', function (ev) {
        ev.preventDefault();
        var raw  = $('slug').value;
        var slug = normalizeSlug(raw);
        if (!slug) { $('err').textContent = 'Enter your workspace ID.'; return; }
        if (!isValidSlug(slug)) {
          $('err').textContent = 'Use lowercase letters, numbers, and hyphens only.';
          return;
        }
        try { localStorage.setItem(STORE_KEY, slug); } catch (_) {}
        gotoWorkspace(slug);
      });

      $('btn-continue').addEventListener('click', function () {
        var s = '';
        try { s = localStorage.getItem(STORE_KEY) || ''; } catch (_) {}
        if (s && isValidSlug(s)) gotoWorkspace(s);
      });

      $('btn-switch').addEventListener('click', function () {
        try { localStorage.removeItem(STORE_KEY); } catch (_) {}
        showPickState();
      });
    })();
  </script>
</body>
</html>
